<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./assets/styles/style.css">
    <link rel="shortcut icon" href="./assets/imgs/pomodoro.png" type="image/x-icon">
    <title>Pomodoro</title>
</head>

<body>
    <header>
        <a href="#">
            <img src="./assets/imgs/pomodoro.png" alt="Maça em forma de relógio, representação da técnica pomodoro">
            <h1>Pomodoro</h1>
        </a>
        <a href="#" class="menu-hamburguer">
            <i class="fa-solid fa-bars"></i>
        </a>
        <section>
            <a href="#"><i class="fa-solid fa-newspaper"></i> Sobre técnica</a>
            <a href="#"><i class="fa-solid fa-box-archive"></i> Como Funciona</a>
            <a href="#"><i class="fa-solid fa-gear"></i> Ajustes</a>
        </section>
    </header>

    <main>
        <section class="banner">
            <h2 class="banner__titulo" id="bannerTitulo">
                Pequenos esforços diários levam a grandes conquistas. <strong>Foque por 25minutos!</strong>
            </h2>
            <img class="banner__img" id="bannerImg" src="./assets/imgs/svg-1.svg" alt="">
        </section>
        <div class="container">
            <section class="categoria">
                <ul class="categoria__item" id="listaBtnsCategoria">
                    <li><button class="active__btn" id="btnTimer">Timer</button></li>
                    <li><button id="btnDescansoCurto">Descanso Curto</button></li>
                    <li><button id="btnDescansoLongo">Descanso Longo</button></li>
                </ul>

                <div class="categoria__relogio">
                    <div class="categoria__relogio__circle">
                        <div class="dot" id="tempoDot"></div>
                        <svg class="svg-1">
                            <circle cx="63" cy="63" r="60"></circle>
                            <circle cx="63" cy="63" r="60" id="tempo1"></circle>
                        </svg>
                        <svg class="svg-2">
                            <circle cx="70" cy="70" r="65"></circle>
                            <circle cx="70" cy="70" r="65" id="tempo2"></circle>
                        </svg>
                        <div id="tempo" data-tempo="1500" data-tempo-fator="1500"></div>
                    </div>
                    <!-- <p class="categoria__relogio__texto">25:00</p> -->
                </div>


                <div class="categoria__musica">
                    <label for="inputMusica">Música</label>
                    <input class="categoria__musica__input" type="checkbox" name="inputMusica" id="inputMusica">
                </div>
                <div class="categoria__btn__iniciar">
                    <button id="comecarPausar">
                        <i class="fa-solid fa-play"></i>
                        Iniciar
                    </button>
                </div>
            </section>

            <section class="tarefa__atual">
                <h2>Tarefa Atual</h2>
                <div class="tarefa__atual__item">
                    <h3>Aula de Calculo II</h3>
                    <div class="tarefa__atual__item__ciclos">
                        <p>4</p>
                    </div>
                    <button class="tarefa__atual__item__detalhes">
                        Ver detalhes da tarefa
                        <i class="fa-solid fa-play"></i>
                    </button>
                    <div class="tarefa__atual__item__botoes">
                        <button><i class="fa-solid fa-square-check"></i></button>
                        <button><i class="fa-solid fa-square-xmark"></i></button>
                    </div>
                </div>
            </section>

            <section class="tarefas">
                <h2>Lista de Tarefas</h2>
                <ul class="tarefas__lista" id="listaTarefas">
                    <!-- <li class="tarefas__lista__item">
                        <h3 class="tarefas__lista__item__titulo">Aula de História</h3>
                        <div class="tarefas__lista__item__btns">
                            <button class="tarefas__lista__item__btns__adicionar">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                            <button class="tarefas__lista__item__btns__concluir">
                                <i class="fa-solid fa-square-check"></i>
                            </button>
                            <button class="tarefas__lista__item__btns__alterar">
                                <i class="fa-regular fa-pen-to-square"></i>
                            </button>
                            <button class="tarefas__lista__item__btns__excluir">
                                <i class="fa-solid fa-square-xmark"></i>
                            </button>
                        </div>
                        <button class="tarefas__lista__item__btn-detalhes">
                            Ver detalhes da tarefa
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <div class="tarefa__lista__item__detalhes">
                            Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book.
                        </div>
                    </li> -->
                </ul>
                <button class="tarefa__adicionar__lista" id="adicionarTarefa">
                    <p>Adicionar Tarefa</p>
                    <i class="fa-solid fa-plus"></i>
                </button>
                <form class="tarefa__formulario" id="tarefaFormulario">
                    <fieldset>
                        <label for="tituloTarefa">Título da tarefa</label>
                        <input type="text" name="tituloTarefa" id="tituloTarefa">
                    </fieldset>
                    <fieldset>
                        <label for="descricaoTarefa">Descrição da tarefa</label>
                        <textarea name="descricaoTarefa" id="descricaoTarefa" cols="30" rows="10"></textarea>
                    </fieldset>
                    <fieldset class="tarefa__formulario__botoes">
                        <button id="adicionarTarefaLista" type="submit">Adicionar</button>
                        <button>Cancelar</button>
                    </fieldset>
                </form>
            </section>

            <section class="tarefas__concluidas">
                <h2>Tarefas Concluidas</h2>
                <ul class="tarefas__concluidas__lista" id="listaTarefasConcluidas">
                    <!-- <li class="tarefas__concluidas__item">
                        <h3 class="tarefas__concluidas__item__titulo">Aula de Física II</h3>
                        <div class="tarefas__concluidas__item__excluir">
                            <button>
                                <i class="fa-solid fa-square-xmark"></i>
                            </button>
                        </div>
                        <button class="tarefas__concluidas__item__btn-detalhes">
                            Ver detalhes da tarefa
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </li> -->
                </ul>
            </section>
        </div>
    </main>

    <script type="module" src="./script/script.js"></script>
</body>

</html>
